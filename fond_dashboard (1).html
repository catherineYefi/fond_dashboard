<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Фонд-Акселератор МД — Дашборд</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.8.0/Recharts.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  :root {
    --navy:    #0A1628;
    --navy2:   #0F1E35;
    --navy3:   #162840;
    --cyan:    #00D4FF;
    --magenta: #FF2D78;
    --gold:    #FFB547;
    --green:   #00E5A0;
    --white:   #F0F4FF;
    --muted:   #5A7299;
    --glass:   rgba(255,255,255,0.04);
    --glass-b: rgba(0,212,255,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; }
  body {
    background: var(--navy);
    color: var(--white);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  /* Noise texture overlay */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0;
  }
  #root { position: relative; z-index: 1; }

  .app { max-width: 1400px; margin: 0 auto; padding: 24px 20px 48px; }

  /* Header */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 32px; padding-bottom: 20px;
    border-bottom: 1px solid rgba(0,212,255,0.12);
  }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .logo-mark {
    width: 44px; height: 44px; border-radius: 12px;
    background: linear-gradient(135deg, var(--cyan), var(--magenta));
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif; font-weight: 800;
    font-size: 18px; color: var(--navy); flex-shrink: 0;
  }
  .header-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; }
  .header-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .header-right { display: flex; align-items: center; gap: 16px; }
  .updated-badge {
    font-family: 'DM Mono', monospace; font-size: 11px;
    color: var(--cyan); background: rgba(0,212,255,0.08);
    border: 1px solid rgba(0,212,255,0.2);
    padding: 6px 12px; border-radius: 20px;
  }
  .refresh-btn {
    background: rgba(0,212,255,0.08); border: 1px solid rgba(0,212,255,0.2);
    color: var(--cyan); padding: 6px 14px; border-radius: 20px;
    font-size: 12px; cursor: pointer; font-family: 'Inter', sans-serif;
    transition: all 0.2s;
  }
  .refresh-btn:hover { background: rgba(0,212,255,0.16); }

  /* Section title */
  .section-label {
    font-family: 'DM Mono', monospace; font-size: 10px;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-label::after {
    content: ''; flex: 1; height: 1px;
    background: rgba(255,255,255,0.06);
  }

  /* Status bar */
  .status-bar {
    display: flex; gap: 12px; margin-bottom: 32px; flex-wrap: wrap;
  }
  .status-pill {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 16px; border-radius: 24px;
    font-size: 13px; font-weight: 500;
    border: 1px solid;
  }
  .status-pill.green  { background: rgba(0,229,160,0.08); border-color: rgba(0,229,160,0.25); color: var(--green); }
  .status-pill.yellow { background: rgba(255,181,71,0.08); border-color: rgba(255,181,71,0.25); color: var(--gold); }
  .status-pill.red    { background: rgba(255,45,120,0.08); border-color: rgba(255,45,120,0.25); color: var(--magenta); }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }

  /* KPI Grid */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px; margin-bottom: 32px;
  }
  .kpi-card {
    background: var(--glass);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 16px; padding: 20px;
    position: relative; overflow: hidden;
    transition: border-color 0.2s, transform 0.2s;
  }
  .kpi-card:hover { border-color: rgba(0,212,255,0.2); transform: translateY(-2px); }
  .kpi-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--glow, rgba(0,212,255,0.4)), transparent);
  }
  .kpi-card.accent-cyan  { --glow: rgba(0,212,255,0.6); }
  .kpi-card.accent-mag   { --glow: rgba(255,45,120,0.6); }
  .kpi-card.accent-green { --glow: rgba(0,229,160,0.6); }
  .kpi-card.accent-gold  { --glow: rgba(255,181,71,0.6); }

  .kpi-label { font-size: 11px; color: var(--muted); margin-bottom: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; }
  .kpi-value { font-family: 'DM Mono', monospace; font-size: 28px; font-weight: 500; line-height: 1; }
  .kpi-value.cyan    { color: var(--cyan); }
  .kpi-value.magenta { color: var(--magenta); }
  .kpi-value.green   { color: var(--green); }
  .kpi-value.gold    { color: var(--gold); }
  .kpi-value.white   { color: var(--white); }
  .kpi-sub { font-size: 11px; color: var(--muted); margin-top: 8px; }

  /* Charts grid */
  .charts-grid {
    display: grid; grid-template-columns: 3fr 2fr;
    gap: 16px; margin-bottom: 32px;
  }
  @media (max-width: 900px) { .charts-grid { grid-template-columns: 1fr; } }

  .chart-card {
    background: var(--glass);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 16px; padding: 24px;
  }
  .chart-title {
    font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700;
    margin-bottom: 20px; color: var(--white);
  }

  /* Bottom grid */
  .bottom-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  @media (max-width: 900px) { .bottom-grid { grid-template-columns: 1fr; } }

  /* Funnel */
  .funnel-row {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .funnel-row:last-child { border-bottom: none; }
  .funnel-stage { font-size: 12px; color: var(--muted); width: 140px; flex-shrink: 0; }
  .funnel-bar-wrap { flex: 1; height: 6px; background: rgba(255,255,255,0.06); border-radius: 3px; overflow: hidden; }
  .funnel-bar { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--cyan), var(--magenta)); transition: width 1s ease; }
  .funnel-num { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--white); width: 40px; text-align: right; }
  .funnel-pct { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); width: 44px; text-align: right; }

  /* Portfolio list */
  .client-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .client-row:last-child { border-bottom: none; }
  .client-name { font-size: 13px; font-weight: 500; }
  .client-status { font-size: 11px; padding: 3px 10px; border-radius: 10px; }
  .client-status.active   { background: rgba(0,229,160,0.1); color: var(--green); }
  .client-status.warn     { background: rgba(255,181,71,0.1); color: var(--gold); }
  .client-status.option   { background: rgba(0,212,255,0.1); color: var(--cyan); }

  /* RNP block */
  .rnp-item {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .rnp-item:last-child { border-bottom: none; }
  .rnp-icon { width: 28px; height: 28px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; margin-top: 1px; }
  .rnp-icon.green  { background: rgba(0,229,160,0.12); }
  .rnp-icon.yellow { background: rgba(255,181,71,0.12); }
  .rnp-icon.red    { background: rgba(255,45,120,0.12); }
  .rnp-text { font-size: 13px; line-height: 1.5; }
  .rnp-text strong { color: var(--white); font-weight: 600; }
  .rnp-text span   { color: var(--muted); }

  /* Loading */
  .loading {
    display: flex; align-items: center; justify-content: center;
    height: 60vh; flex-direction: column; gap: 16px;
  }
  .spinner {
    width: 36px; height: 36px; border-radius: 50%;
    border: 2px solid rgba(0,212,255,0.2);
    border-top-color: var(--cyan);
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Error */
  .error-box {
    background: rgba(255,45,120,0.08); border: 1px solid rgba(255,45,120,0.2);
    border-radius: 12px; padding: 20px; margin: 20px 0;
    font-size: 13px; color: var(--magenta);
  }
  .error-box code { font-family: 'DM Mono', monospace; font-size: 11px; }

  /* Tooltip */
  .recharts-tooltip-wrapper .custom-tooltip {
    background: var(--navy2); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px; padding: 10px 14px; font-size: 12px;
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback } = React;
const { BarChart, Bar, LineChart, Line, XAxis, YAxis, CartesianGrid, 
        Tooltip, ResponsiveContainer, Legend, Cell } = Recharts;

// ─── НАСТРОЙКИ ───────────────────────────────────────────────────────────────
// Замени SHEET_ID на ID своей Google Таблицы (из URL)
// Замени GID на gid листа "KPI" (виден в URL при открытии листа)
const SHEET_ID = '1izDsZ7aOc_1v064vGr2cU3xtYlSA2atvZrg6tyo2oNw';
const KPI_GID  = '901148838';  // gid листа KPI
const CSV_URL  = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${KPI_GID}`;

// Fallback данные — используются пока не настроен Google Sheets
const DEMO_DATA = {
  gross_revenue:   88666911,
  net_revenue:     72677796,
  ebitda:          15709584,
  net_profit:      11482267,
  ebitda_margin:   0.216,
  np_margin:       0.158,
  cf_ytd:          14843757,
  ebitda_ytd:       5817563,
  np_ytd:           4628369,
  clients_active:  10,
  clients_confirm:  6,
  tbu_mm:          13,
  tbu_aks:          7,
  next_mm:         'август 2026',
  opex_month:    1415250,
  deferred:       2542991,
  min_cash:       3975008,
  month_label:    'июнь 2026',
  updated:        'апрель–май 2026 (факт)',
  // Воронка апрель
  leads:          108,
  scored:          16,
  approved:        11,
  guests:           5,
  signed:           2,
  // Квартальная выручка
  q1_sub:   9000000, q1_mm:          0, q1_str:  284154,
  q2_sub:   9500000, q2_mm:  13000000, q2_str: 2282000,
  q3_sub:  12000000, q3_mm:   7000000, q3_str: 3243278,
  q4_sub:  13500000, q4_mm:  11500000, q4_str: 2382992,
  // Помесячный EBITDA (апр–мар)
  ebitda_apr: -447408, ebitda_may: -447408, ebitda_jun: -286398,
  ebitda_jul:  136827, ebitda_aug: 4326318, ebitda_sep:  508787,
  ebitda_oct: 1476140, ebitda_nov: 1394616, ebitda_dec:  972715,
  ebitda_jan: 4481129, ebitda_feb: 1389364, ebitda_mar: 1705497,
};

// ─── Парсер CSV из Google Sheets ──────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split('\n');
  const data = {};
  lines.slice(1).forEach(line => {
    const cols = line.split(',');
    if (cols[0] && cols[1]) {
      const key = cols[0].trim();
      const raw = cols[1].trim();
      const num = parseFloat(raw);
      data[key] = isNaN(num) ? raw : num;
    }
  });
  return data;
}

// ─── Форматирование ───────────────────────────────────────────────────────────
const fmt = (n, compact=false) => {
  if (n === null || n === undefined) return '—';
  if (compact) {
    if (Math.abs(n) >= 1e9) return (n/1e9).toFixed(1) + ' млрд';
    if (Math.abs(n) >= 1e6) return (n/1e6).toFixed(1) + ' млн';
    if (Math.abs(n) >= 1e3) return (n/1e3).toFixed(0) + ' тыс';
  }
  return new Intl.NumberFormat('ru-RU').format(Math.round(n));
};
const pct = n => n != null ? (n*100).toFixed(1) + '%' : '—';

// ─── Компоненты ───────────────────────────────────────────────────────────────
function KpiCard({ label, value, sub, color='cyan', accent='accent-cyan' }) {
  return (
    <div className={`kpi-card ${accent}`}>
      <div className="kpi-label">{label}</div>
      <div className={`kpi-value ${color}`}>{value}</div>
      {sub && <div className="kpi-sub">{sub}</div>}
    </div>
  );
}

function CustomTooltip({ active, payload, label }) {
  if (!active || !payload?.length) return null;
  return (
    <div className="custom-tooltip" style={{background:'#0F1E35',border:'1px solid rgba(255,255,255,0.1)',borderRadius:10,padding:'10px 14px',fontSize:12}}>
      <div style={{color:'#5A7299',marginBottom:6,fontFamily:'DM Mono, monospace'}}>{label}</div>
      {payload.map((p,i) => (
        <div key={i} style={{color:p.color,marginTop:3}}>
          {p.name}: <strong>{fmt(p.value, true)}</strong>
        </div>
      ))}
    </div>
  );
}

// ─── Главный компонент ────────────────────────────────────────────────────────
function App() {
  const [d, setD] = useState(null);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [lastFetch, setLastFetch] = useState(null);
  const [usingDemo, setUsingDemo] = useState(false);

  const loadData = useCallback(async () => {
    setLoading(true); setError(null);
    if (SHEET_ID === 'YOUR_GOOGLE_SHEET_ID') {
      // Google Sheets не настроен — используем демо
      setD(DEMO_DATA); setUsingDemo(true);
      setLastFetch(new Date()); setLoading(false); return;
    }
    try {
      const res = await fetch(CSV_URL + '&t=' + Date.now());
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const text = await res.text();
      const parsed = parseCSV(text);
      setD({ ...DEMO_DATA, ...parsed });
      setUsingDemo(false);
      setLastFetch(new Date());
    } catch (e) {
      setError(e.message);
      setD(DEMO_DATA); setUsingDemo(true);
    } finally { setLoading(false); }
  }, []);

  useEffect(() => { loadData(); }, [loadData]);

  if (loading) return (
    <div className="loading">
      <div className="spinner"/>
      <span style={{color:'var(--muted)',fontSize:13}}>Загрузка данных...</span>
    </div>
  );

  const q_data = [
    { name: 'Q1\nапр–июн', sub: d.q1_sub, mm: d.q1_mm, str: d.q1_str },
    { name: 'Q2\nиюл–сен', sub: d.q2_sub, mm: d.q2_mm, str: d.q2_str },
    { name: 'Q3\nокт–дек', sub: d.q3_sub, mm: d.q3_mm, str: d.q3_str },
    { name: 'Q4\nянв–мар', sub: d.q4_sub, mm: d.q4_mm, str: d.q4_str },
  ];

  const months_data = [
    {m:'апр',e:d.ebitda_apr},{m:'май',e:d.ebitda_may},{m:'июн',e:d.ebitda_jun},
    {m:'июл',e:d.ebitda_jul},{m:'авг',e:d.ebitda_aug},{m:'сен',e:d.ebitda_sep},
    {m:'окт',e:d.ebitda_oct},{m:'ноя',e:d.ebitda_nov},{m:'дек',e:d.ebitda_dec},
    {m:'янв',e:d.ebitda_jan},{m:'фев',e:d.ebitda_feb},{m:'мар',e:d.ebitda_mar},
  ];

  const funnel = [
    {stage:'Заявки',    n:d.leads,    base:d.leads},
    {stage:'Скоринг',   n:d.scored,   base:d.leads},
    {stage:'Одобрено',  n:d.approved, base:d.leads},
    {stage:'Гости ММ',  n:d.guests,   base:d.leads},
    {stage:'Договор',   n:d.signed,   base:d.leads},
  ];

  const clients = [
    {name:'Изосина / Oazis Estate',   status:'option',  label:'→ Опцион'},
    {name:'Голубенко / Разум Инвест', status:'option',  label:'→ Опцион'},
    {name:'Бражников / Лига Миров',   status:'active',  label:'Активен'},
    {name:'ООО ВСЕЛЕННАЯ (Бобрук)',   status:'active',  label:'Активен'},
    {name:'Иванова Наталья',          status:'active',  label:'Акселерация'},
    {name:'Цыганов / Рыбак',          status:'warn',    label:'Уточнить'},
  ];

  const tbu_ok_mm = d.clients_active >= d.tbu_mm;
  const ebitda_ok = d.ebitda > 0;

  const rnp_items = [
    { color: tbu_ok_mm ? 'green' : 'yellow', icon: tbu_ok_mm ? '✓' : '⚠',
      text: tbu_ok_mm
        ? <><strong>Портфель выше ТБУ</strong> <span>({d.clients_active} кл из {d.tbu_mm} нужных)</span></>
        : <><strong>Ниже ТБУ по подписке</strong> <span>({d.clients_active}/{d.tbu_mm} кл — дефицит перекрывается ММ-событиями)</span></> },
    { color: 'green', icon: '📅',
      text: <><strong>Ближайший ММ</strong> <span>— {d.next_mm}</span></> },
    { color: 'green', icon: '💰',
      text: <><strong>Мин. кассовый остаток</strong> <span>{fmt(d.min_cash, true)} ₽ — необходим до августовского ММ</span></> },
    { color: ebitda_ok ? 'green' : 'yellow', icon: ebitda_ok ? '📈' : '📊',
      text: ebitda_ok
        ? <><strong>EBITDA год план {fmt(d.ebitda, true)} ₽</strong> <span>· рент. {pct(d.ebitda_margin)}</span></>
        : <><strong>Операционный убыток в июне</strong> <span>— плановый, выход с августа</span></> },
    { color: 'yellow', icon: '🎯',
      text: <><strong>Цель к дек.26</strong> <span>— 16 клиентов (+6 с ММ-событий)</span></> },
  ];

  return (
    <div className="app">
      {/* Header */}
      <div className="header">
        <div className="header-left">
          <div className="logo-mark">МД</div>
          <div>
            <div className="header-title">Фонд-Акселератор МД</div>
            <div className="header-sub">Управленческий дашборд · апр.2026 – мар.2027</div>
          </div>
        </div>
        <div className="header-right">
          {usingDemo && (
            <span style={{fontSize:11,color:'var(--gold)',background:'rgba(255,181,71,0.08)',border:'1px solid rgba(255,181,71,0.2)',padding:'5px 10px',borderRadius:12}}>
              Demo данные
            </span>
          )}
          <div className="updated-badge">
            Обновлено: {lastFetch ? lastFetch.toLocaleTimeString('ru', {hour:'2-digit',minute:'2-digit'}) : '—'}
          </div>
          <button className="refresh-btn" onClick={loadData}>↻ Обновить</button>
        </div>
      </div>

      {usingDemo && SHEET_ID === 'YOUR_GOOGLE_SHEET_ID' && (
        <div className="error-box">
          <strong>Google Sheets не подключён.</strong> Показаны demo данные.<br/>
          Замени <code>SHEET_ID</code> и <code>KPI_GID</code> в коде на параметры своей таблицы.<br/>
          Инструкция: Таблица → Файл → Поделиться → Опубликовать в интернете → Выбрать лист KPI → CSV
        </div>
      )}

      {error && (
        <div className="error-box">
          Ошибка загрузки: {error}. Используются последние данные.
        </div>
      )}

      {/* Status bar */}
      <div className="section-label">Статус · {d.month_label}</div>
      <div className="status-bar">
        <div className={`status-pill ${d.ebitda > 0 ? 'green' : 'yellow'}`}>
          <div className="dot"/> EBITDA год: {fmt(d.ebitda, true)} ₽
        </div>
        <div className={`status-pill ${d.clients_active >= d.tbu_aks ? 'green' : 'yellow'}`}>
          <div className="dot"/> Портфель: {d.clients_active} кл · ТБУ Акс: {d.tbu_aks}
        </div>
        <div className="status-pill yellow">
          <div className="dot"/> Следующий ММ: {d.next_mm}
        </div>
        <div className="status-pill green">
          <div className="dot"/> Мин. остаток: {fmt(d.min_cash, true)} ₽
        </div>
      </div>

      {/* KPI cards */}
      <div className="section-label">Ключевые показатели · план год</div>
      <div className="kpi-grid">
        <KpiCard label="Выручка gross / год" value={fmt(d.gross_revenue, true)+' ₽'} sub="апр.26–мар.27" color="cyan" accent="accent-cyan"/>
        <KpiCard label="Выручка net / год"   value={fmt(d.net_revenue, true)+' ₽'}   sub="без НДС 22%" color="white" accent="accent-cyan"/>
        <KpiCard label="EBITDA / год"         value={fmt(d.ebitda, true)+' ₽'}        sub={`Рент. ${pct(d.ebitda_margin)}`} color="green" accent="accent-green"/>
        <KpiCard label="Чистая прибыль / год" value={fmt(d.net_profit, true)+' ₽'}   sub={`Рент. ${pct(d.np_margin)}`} color="green" accent="accent-green"/>
        <KpiCard label="OPEX / месяц"         value={fmt(d.opex_month, true)+' ₽'}    sub="с 01.06.2026" color="gold" accent="accent-gold"/>
        <KpiCard label="CF нарастающим"       value={fmt(d.cf_ytd, true)+' ₽'}        sub="факт окт.25–май.26" color="cyan" accent="accent-cyan"/>
        <KpiCard label="Отложенная выручка"   value={fmt(d.deferred, true)+' ₽'}      sub="аванс, услуга впереди" color="gold" accent="accent-gold"/>
        <KpiCard label="Клиентов в модели"    value={String(d.clients_active)}         sub={`подтв.: ${d.clients_confirm} · уточнить: ${d.clients_active - d.clients_confirm - 1}`} color="magenta" accent="accent-mag"/>
      </div>

      {/* YTD факт */}
      <div className="section-label">Факт нарастающим · окт.2025 – май.2026</div>
      <div className="kpi-grid" style={{gridTemplateColumns:'repeat(3,1fr)',marginBottom:32}}>
        <KpiCard label="EBITDA YTD"           value={fmt(d.ebitda_ytd, true)+' ₽'} sub="операц. прибыль" color="green" accent="accent-green"/>
        <KpiCard label="Чистая прибыль YTD"   value={fmt(d.np_ytd, true)+' ₽'}     sub="после НДС" color="green" accent="accent-green"/>
        <KpiCard label="CF YTD"               value={fmt(d.cf_ytd, true)+' ₽'}      sub="реально на счёте" color="cyan" accent="accent-cyan"/>
      </div>

      {/* Charts */}
      <div className="section-label">Выручка и EBITDA · план апр.26–мар.27</div>
      <div className="charts-grid">
        <div className="chart-card">
          <div className="chart-title">Выручка gross по продуктам — поквартально</div>
          <ResponsiveContainer width="100%" height={220}>
            <BarChart data={q_data} barCategoryGap="28%">
              <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.05)" vertical={false}/>
              <XAxis dataKey="name" tick={{fill:'#5A7299',fontSize:11,fontFamily:'DM Mono'}} axisLine={false} tickLine={false}/>
              <YAxis tick={{fill:'#5A7299',fontSize:10,fontFamily:'DM Mono'}} axisLine={false} tickLine={false}
                     tickFormatter={v => fmt(v,true)} width={56}/>
              <Tooltip content={<CustomTooltip/>}/>
              <Legend iconType="circle" iconSize={6}
                      wrapperStyle={{fontSize:11,color:'#5A7299',fontFamily:'DM Mono'}}/>
              <Bar dataKey="sub" name="Подписки"   fill="#1A4A6B" stackId="a" radius={[0,0,0,0]}/>
              <Bar dataKey="mm"  name="ММ-события" fill="#00D4FF" stackId="a" radius={[0,0,0,0]}/>
              <Bar dataKey="str" name="Стратсессии" fill="#FF2D78" stackId="a" radius={[4,4,0,0]}/>
            </BarChart>
          </ResponsiveContainer>
        </div>

        <div className="chart-card">
          <div className="chart-title">EBITDA по месяцам</div>
          <ResponsiveContainer width="100%" height={220}>
            <BarChart data={months_data} barCategoryGap="20%">
              <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.05)" vertical={false}/>
              <XAxis dataKey="m" tick={{fill:'#5A7299',fontSize:10,fontFamily:'DM Mono'}} axisLine={false} tickLine={false}/>
              <YAxis tick={{fill:'#5A7299',fontSize:10,fontFamily:'DM Mono'}} axisLine={false} tickLine={false}
                     tickFormatter={v => fmt(v,true)} width={52}/>
              <Tooltip content={<CustomTooltip/>}/>
              <Bar dataKey="e" name="EBITDA" radius={[3,3,0,0]}>
                {months_data.map((m,i) => (
                  <Cell key={i} fill={m.e >= 0 ? '#00E5A0' : '#FF2D78'}/>
                ))}
              </Bar>
            </BarChart>
          </ResponsiveContainer>
        </div>
      </div>

      {/* Bottom: Funnel + Clients + RNP */}
      <div className="section-label">Портфель и воронка · {d.month_label}</div>
      <div className="bottom-grid">
        <div className="chart-card">
          <div className="chart-title">Воронка продаж</div>
          {funnel.map((f,i) => (
            <div key={i} className="funnel-row">
              <div className="funnel-stage">{f.stage}</div>
              <div className="funnel-bar-wrap">
                <div className="funnel-bar" style={{width: f.base ? `${Math.round(f.n/f.base*100)}%` : '0%'}}/>
              </div>
              <div className="funnel-num">{f.n}</div>
              <div className="funnel-pct">{f.base ? Math.round(f.n/f.base*100)+'%' : '—'}</div>
            </div>
          ))}
          <div style={{marginTop:16,paddingTop:12,borderTop:'1px solid rgba(255,255,255,0.06)',
                       display:'flex',justifyContent:'space-between',fontSize:11,color:'var(--muted)'}}>
            <span>Итоговая конверсия</span>
            <span style={{fontFamily:'DM Mono, monospace',color:'var(--cyan)'}}>
              {d.leads ? (d.signed/d.leads*100).toFixed(1) + '%' : '—'}
            </span>
          </div>
        </div>

        <div>
          <div className="chart-card" style={{marginBottom:16}}>
            <div className="chart-title">Портфель компаний</div>
            {clients.map((c,i) => (
              <div key={i} className="client-row">
                <div className="client-name">{c.name}</div>
                <div className={`client-status ${c.status}`}>{c.label}</div>
              </div>
            ))}
          </div>

          <div className="chart-card">
            <div className="chart-title">К РНП — ключевые темы</div>
            {rnp_items.map((item,i) => (
              <div key={i} className="rnp-item">
                <div className={`rnp-icon ${item.color}`}>{item.icon}</div>
                <div className="rnp-text">{item.text}</div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Footer */}
      <div style={{marginTop:40,paddingTop:20,borderTop:'1px solid rgba(255,255,255,0.05)',
                   display:'flex',justifyContent:'space-between',alignItems:'center',
                   fontSize:11,color:'var(--muted)'}}>
        <span style={{fontFamily:'DM Mono, monospace'}}>
          Фонд-Акселератор МД · ООО «Группа Развития»
        </span>
        <span>
          Данные: {d.updated} · 
          <a href="https://fond-accelerator.ru" target="_blank" rel="noreferrer"
             style={{color:'var(--cyan)',textDecoration:'none',marginLeft:4}}>
            fond-accelerator.ru
          </a>
        </span>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
