:root{

// ── Утилиты ──
const Nc = n => {
  if(n==null||n===''||(typeof n==='number'&&isNaN(n))) return '—';
  if(typeof n!=='number'){ const x=parseFloat(String(n).replace(/\s/g,'').replace(',','.')); if(isNaN(x)) return '—'; n=x; }
  const a=Math.abs(n), s=n<0?'−':'';
  if(a>=1e9) return s+(a/1e9).toFixed(1).replace('.',',')+' млрд';
  if(a>=1e6) return s+(a/1e6).toFixed(1).replace('.',',')+' млн';
  if(a>=1e3) return s+(a/1e3).toFixed(0)+' тыс';
  return s+Math.round(a);
};
const Nf = n => n==null?'—':new Intl.NumberFormat('ru-RU').format(Math.round(n));
const Pct = n => (n==null||isNaN(n))?'—':(n*100).toFixed(1).replace('.',',')+'%';

// ── Парсер CSV вкладки WEB (секции K / C / P / PT) ──
function splitCSV(line){
  const out=[]; let cur='', q=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(ch==='"'){ q=!q; }
    else if(ch===',' && !q){ out.push(cur); cur=''; }
    else cur+=ch;
  }
  out.push(cur); return out;
}
function num(v){
  if(v==null) return null;
  let s=String(v).trim().replace(/"/g,'').replace(/\s/g,'');
  if(s.endsWith('%')){ const n=parseFloat(s.replace('%','').replace(',','.')); return isNaN(n)?null:n/100; }
  const n=parseFloat(s.replace(',','.')); return isNaN(n)?null:n;
}
function parseFeed(txt){
  const k={}, c=[], p=[], ev=[], rec=[]; let pt=null, recTL=[];
  txt.trim().split(/\r?\n/).forEach(line=>{
    const f=splitCSV(line); const tag=(f[0]||'').trim();
    if(tag==='K'){ const key=(f[1]||'').trim(); const raw=(f[2]||'').trim().replace(/"/g,'');
      if(key.endsWith('_label')||key.endsWith('_title')||key.endsWith('_dates')||key.endsWith('_iso')||key.endsWith('_target')||key.endsWith('_asof')){ k[key]=raw; }
      else { const nv=num(raw); k[key]=(nv==null?0:nv); } }
    else if(tag==='C'){ c.push([f[1],f[2],f[3],f[4]].map(x=>(x||'').trim().replace(/"/g,''))); }
    else if(tag==='P'){ p.push([(f[1]||'').trim().replace(/"/g,''),...f.slice(2,15).map(num)]); }
    else if(tag==='PT'){ pt=[(f[1]||'').trim(),...f.slice(2,15).map(num)]; }
    else if(tag==='EV'){ ev.push({name:(f[1]||'').trim().replace(/"/g,''),n:num(f[2])||0,rev:num(f[3])||0,
      price:(f[4]||'').trim().replace(/"/g,''),role:(f[5]||'').trim().replace(/"/g,'')}); }
    else if(tag==='R'){ rec.push({name:(f[1]||'').trim().replace(/"/g,''),cf:num(f[2])||0,pl:num(f[3])||0}); }
    else if(tag==='RT'){ recTL=f.slice(1,8).map(x=>num(x)||0); }
  });
  return {k,c,p,pt,ev,rec,recTL};
}

async function loadData(){
  if(!PUB_CSV_URL) return {d:DEMO, demo:true, err:null};
  try{
    const r=await fetch(PUB_CSV_URL+(PUB_CSV_URL.includes('?')?'&':'?')+'cb='+Date.now());
    if(!r.ok) throw new Error('HTTP '+r.status);
    const txt=await r.text();
    if(txt.includes('<!DOCTYPE')||txt.includes('<html')) throw new Error('лист не опубликован');
    const d=parseFeed(txt);
    if(d.k.gross_plan==null) throw new Error('данные не распознаны');
    return {d, demo:false, err:null};
  }catch(e){ return {d:DEMO, demo:true, err:e.message}; }
}

// ── Рендер ──
function kpiPF(label, plan, fact, vc, ac, note){
  const pct = (plan!=null && plan!==0) ? fact/plan : null;
  const w = pct!=null ? Math.max(0,Math.min(100,pct*100)) : 0;
  const factCol = (fact!=null && fact<0) ? ' style="color:var(--mag)"' : '';
  const pctCol  = (pct!=null && pct<0)   ? ' style="color:var(--mag)"' : ' style="color:var(--cyan)"';
  return `<div class="kpi ${ac}">
    <div class="kpi-lbl">${label}</div>
    <div class="kpi-vlbl">план год</div>
    <div class="kpi-val ${vc}">${Nc(plan)} ₽</div>
    <div class="kpi-rows">
      <div class="kr"><span>Факт YTD</span><b${factCol}>${Nc(fact)} ₽</b></div>
      <div class="kr pct"><span>% выполнения</span><b${pctCol}>${Pct(pct)}</b></div>
    </div>
    <div class="kpi-bar"><div class="kpi-fill" style="width:${w}%"></div></div>
    ${note?`<div class="kpi-note">${note}</div>`:''}
  </div>`;
}
function statusClass(s){
  if(/Пауза|⏸/.test(s)) return 'muted';
  if(/Счёт|⚠/.test(s)) return 'warn';
  if(/Нов|☆/.test(s)) return 'cyan';
  if(/DD|⟳/.test(s)) return 'violet';
  return 'green';
}

const EV_COLORS={cyan:'#00D4FF',mag:'#FF2D78',green:'#00E5A0'};
function getEvent(d){
  const k=d.k;
  if(d.ev && d.ev.length){
    return {
      title:k.ev_title||'ММ Фонда', dates:k.ev_dates||'', date_iso:k.ev_date_iso||'',
      people:k.ev_people||d.ev.reduce((s,e)=>s+e.n,0),
      total_rev:k.ev_total_rev||d.ev.reduce((s,e)=>s+e.rev,0),
      target:k.ev_target||'',
      streams:d.ev.map((e,i)=>({...e,color:['cyan','mag','green'][i]||'cyan'}))
    };
  }
  return EVENT_DEFAULT;
}
function daysUntil(iso){
  if(!iso) return null;
  const t=new Date(iso+'T00:00:00'); if(isNaN(t)) return null;
  return Math.ceil((t-new Date())/86400000);
}
function buildEvent(d){
  const e=getEvent(d), cd=daysUntil(e.date_iso);
  const cal='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>';
  const cdTxt = cd==null?'' : (cd>0?`через ${cd} дн.`:(cd>-7?'идёт сейчас':''));
  const segs=e.streams.map(s=>{
    const c=EV_COLORS[s.color]||'#00D4FF';
    return `<div class="ev-seg" style="flex:${s.n};background:linear-gradient(135deg,${c},${c}cc)">
      <div class="n">${s.n}</div><div class="t">${s.name.split(' ')[0]}</div></div>`;
  }).join('');
  const cards=e.streams.map(s=>{
    const c=EV_COLORS[s.color]||'#00D4FF';
    return `<div class="ev-stream" style="border-top-color:${c}">
      <div class="ev-s-n" style="color:${c}">${s.n}</div>
      <div class="ev-s-name">${s.name}</div>
      <div class="ev-s-price">${s.price}</div>
      <div class="ev-s-rev">${Nc(s.rev)} ₽</div>
      <div class="ev-s-role">${s.role}</div></div>`;
  }).join('');
  return `<div class="sec">Предстоящие события</div>
  <div class="ev-card">
    <div class="ev-top">
      <div>
        <div class="ev-title-row"><div class="ev-name">${e.title}</div>${cdTxt?`<span class="ev-cd">${cdTxt}</span>`:''}</div>
        <div class="ev-dates">${cal}${e.dates}</div>
        <div class="ev-frame">Мастермайнд — ключевая точка конверсии воронки фонда</div>
      </div>
      <div class="ev-metrics">
        <div><div class="ev-m-l">участников</div><div class="ev-m-v">${e.people}</div></div>
        <div><div class="ev-m-l">выручка события</div><div class="ev-m-v" style="color:var(--cyan)">${Nc(e.total_rev)} ₽</div></div>
      </div>
    </div>
    <div class="ev-bar">${segs}</div>
    <div class="ev-streams">${cards}</div>
    <div class="ev-foot"><span class="efl">Цель события:</span><span class="ev-goal">${e.target}</span></div>
  </div>`;
}

const REC_MONTHS=['июн','июл','авг','сен','окт','ноя','дек'];
const REC_MONTHS_FULL=['июню','июлю','августу','сентябрю','октябрю','ноябрю','декабрю'];
function getRec(d){
  const k=d.k;
  if(d.rec && d.rec.length){
    const cf=k.rec_cf||d.rec.reduce((s,x)=>s+x.cf,0);
    const pl=k.rec_pl||d.rec.reduce((s,x)=>s+x.pl,0);
    return {cf, pl, deferred:k.rec_deferred||(cf-pl), pct:k.rec_pct||(pl/cf), asof:k.rec_asof||'',
      clients:d.rec, timeline:(d.recTL&&d.recTL.length?d.recTL:REC_DEFAULT.timeline)};
  }
  return REC_DEFAULT;
}
function buildRec(d){
  const r=getRec(d);
  const rows=r.clients.map(c=>{
    const def=c.cf-c.pl, pct=c.cf?c.pl/c.cf:0;
    return `<div class="recr">
      <div class="recr-name">${c.name}</div>
      <div class="recr-mid">
        <div class="recr-bar"><div class="recr-fill" style="width:${Math.round(pct*100)}%"></div></div>
        <div class="recr-pct">${Math.round(pct*100)}%</div>
      </div>
      <div class="recr-def"><span>отложено</span><b>${Nc(def)} ₽</b></div>
    </div>`;
  }).join('');
  const mx=Math.max(...r.timeline,1);
  let last=-1; r.timeline.forEach((v,i)=>{if(v>0)last=i;});
  const bars=r.timeline.map((v,i)=>`<div class="rec-col">
    <div class="rec-col-val">${v>0?Nc(v):''}</div>
    <div class="rec-col-fill" style="height:${Math.round(v/mx*100)}%;opacity:${v>0?1:.15}"></div>
    <div class="rec-col-m">${REC_MONTHS[i]}</div></div>`).join('');
  const closeTxt = last>=0?`Отложенное полностью отрабатывается к ${REC_MONTHS_FULL[last]} 2026 — при условии текущего портфеля`:'';
  return `<div class="sec">Признание выручки · ${r.asof}</div>
  <div class="card rec-card">
    <div class="rec-flow">
      <div class="rec-stat"><div class="rec-l">Поступило (деньги)</div><div class="rec-v v-c">${Nc(r.cf)} ₽</div></div>
      <span class="rec-arrow">→</span>
      <div class="rec-stat"><div class="rec-l">Отработано (услуга оказана)</div><div class="rec-v v-gn">${Nc(r.pl)} ₽</div></div>
      <span class="rec-arrow">→</span>
      <div class="rec-stat hl"><div class="rec-l">Отложено (ещё должны оказать)</div><div class="rec-v v-go">${Nc(r.deferred)} ₽</div></div>
    </div>
    <div class="rec-clients">${rows}</div>
    <div class="rec-tl">
      <div class="rec-tl-t">Отработка отложенного — когда закроется</div>
      <div class="rec-bars">${bars}</div>
      ${closeTxt?`<div class="rec-tl-note">${closeTxt}</div>`:''}
    </div>
  </div>`;
}

let chartM=null;
function buildChart(k){
  if(chartM){chartM.destroy();chartM=null;}
  const cm=document.getElementById('cm'); if(!cm) return;
  const vals=Array.from({length:12},(_,i)=>k['ebitda_m'+(i+1)]??0);
  const grid='rgba(255,255,255,0.05)', tick={color:'#4A6080',font:{size:10,family:"'DM Mono',monospace"}};
  chartM=new Chart(cm,{type:'bar',
    data:{labels:MONTHS,datasets:[{label:'EBITDA план',data:vals,borderRadius:3,
      backgroundColor:vals.map(v=>v>=0?'rgba(0,229,160,0.75)':'rgba(255,45,120,0.75)')}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},
      tooltip:{callbacks:{label:c=>Nc(c.raw)+' ₽'}}},
      scales:{x:{grid:{color:grid},ticks:tick},y:{grid:{color:grid},ticks:{...tick,callback:v=>Nc(v)}}}}});
}

      <span style="font-family:'DM Mono',monospace">Фонд-Акселератор МД · ООО «Группа Развития»</span>

    </div>`;

  requestAnimationFrame(()=>buildChart(k));
}

  document.getElementById('loader').style.display='flex';
  document.getElementById('app').style.display='none';
  const {d,demo,err}=await loadData();

  document.getElementById('loader').style.display='none';
  document.getElementById('app').style.display='block';
  render(d,demo,err,time);
}
init();
