<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Фонд-Акселератор МД</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0A1628;--navy2:#0F1E35;
  --cyan:#00D4FF;--mag:#FF2D78;--gold:#FFB547;--green:#00E5A0;
  --white:#F0F4FF;--muted:#4A6080;--glass:rgba(255,255,255,0.04);
}
html,body{background:var(--navy);color:var(--white);font-family:'Inter',sans-serif;min-height:100vh}
body{padding:24px 20px 60px}
.wrap{max-width:1400px;margin:0 auto}

.hdr{display:flex;align-items:center;justify-content:space-between;
     padding-bottom:20px;margin-bottom:28px;
     border-bottom:1px solid rgba(0,212,255,0.1);flex-wrap:wrap;gap:12px}
.hdr-l{display:flex;align-items:center;gap:14px}
.logo{width:42px;height:42px;border-radius:11px;flex-shrink:0;
      background:linear-gradient(135deg,var(--cyan),var(--mag));
      display:flex;align-items:center;justify-content:center;
      font-family:'Syne',sans-serif;font-weight:800;font-size:17px;color:var(--navy)}
.hdr-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:700}
.hdr-sub{font-size:11px;color:var(--muted);margin-top:3px}
.hdr-r{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.badge{font-family:'DM Mono',monospace;font-size:11px;color:var(--cyan);
       background:rgba(0,212,255,0.08);border:1px solid rgba(0,212,255,0.18);
       padding:5px 11px;border-radius:18px}
.badge.demo{color:var(--gold);background:rgba(255,181,71,0.08);border-color:rgba(255,181,71,0.2)}
.btn{background:rgba(0,212,255,0.08);border:1px solid rgba(0,212,255,0.18);
     color:var(--cyan);padding:5px 13px;border-radius:18px;
     font-size:12px;cursor:pointer;font-family:'Inter',sans-serif;transition:.2s}
.btn:hover{background:rgba(0,212,255,0.16)}

.sec{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;
     text-transform:uppercase;color:var(--muted);margin-bottom:12px;
     display:flex;align-items:center;gap:8px}
.sec::after{content:'';flex:1;height:1px;background:rgba(255,255,255,0.05)}

.pills{display:flex;gap:10px;margin-bottom:28px;flex-wrap:wrap}
.pill{display:flex;align-items:center;gap:7px;padding:7px 14px;border-radius:22px;font-size:12px;font-weight:500;border:1px solid}
.pill.g{background:rgba(0,229,160,.07);border-color:rgba(0,229,160,.22);color:var(--green)}
.pill.y{background:rgba(255,181,71,.07);border-color:rgba(255,181,71,.22);color:var(--gold)}
.dot{width:6px;height:6px;border-radius:50%;background:currentColor}

.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:14px;margin-bottom:28px}
.ytd-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:28px}
@media(max-width:700px){.ytd-grid{grid-template-columns:1fr}}

.kpi{background:var(--glass);border:1px solid rgba(255,255,255,0.07);border-radius:14px;
     padding:18px 20px;position:relative;overflow:hidden;transition:.2s}
.kpi:hover{border-color:rgba(0,212,255,.2);transform:translateY(-2px)}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;
             background:linear-gradient(90deg,transparent,var(--gl,rgba(0,212,255,.5)),transparent)}
.kpi.c{--gl:rgba(0,212,255,.6)}.kpi.m{--gl:rgba(255,45,120,.6)}
.kpi.gn{--gl:rgba(0,229,160,.6)}.kpi.go{--gl:rgba(255,181,71,.6)}
.kpi-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.kpi-val{font-family:'DM Mono',monospace;font-size:24px;font-weight:500;line-height:1}
.v-c{color:var(--cyan)}.v-m{color:var(--mag)}.v-gn{color:var(--green)}.v-go{color:var(--gold)}.v-w{color:var(--white)}
.kpi-sub{font-size:10px;color:var(--muted);margin-top:7px}

.charts-grid{display:grid;grid-template-columns:3fr 2fr;gap:14px;margin-bottom:28px}
@media(max-width:860px){.charts-grid{grid-template-columns:1fr}}
.card{background:var(--glass);border:1px solid rgba(255,255,255,0.07);border-radius:14px;padding:22px}
.card-t{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;margin-bottom:16px}
/* КЛЮЧЕВОЕ: явная высота для контейнера графика */
.chart-box{position:relative;height:220px;width:100%}

.bot-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:860px){.bot-grid{grid-template-columns:1fr}}

.fr{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.fr:last-child{border-bottom:none}
.f-stage{font-size:11px;color:var(--muted);width:110px;flex-shrink:0}
.f-bg{flex:1;height:5px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden}
.f-bar{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--cyan),var(--mag));transition:width 1.2s ease}
.f-n{font-family:'DM Mono',monospace;font-size:12px;color:var(--white);width:28px;text-align:right}
.f-p{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);width:36px;text-align:right}

.cr{display:flex;align-items:center;justify-content:space-between;
    padding:9px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.cr:last-child{border-bottom:none}
.cr-name{font-size:12px;font-weight:500}
.ct{font-size:10px;padding:3px 9px;border-radius:9px;font-weight:500}
.ct.active{background:rgba(0,229,160,.1);color:var(--green)}
.ct.warn{background:rgba(255,181,71,.1);color:var(--gold)}
.ct.opt{background:rgba(0,212,255,.1);color:var(--cyan)}

.ri{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.ri:last-child{border-bottom:none}
.ri-ic{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;
       justify-content:center;font-size:12px;flex-shrink:0;margin-top:1px}
.ri-ic.g{background:rgba(0,229,160,.12)}.ri-ic.y{background:rgba(255,181,71,.12)}
.rt{font-size:12px;line-height:1.55}
.rt b{color:var(--white);font-weight:600}.rt span{color:var(--muted)}

.err{background:rgba(255,45,120,.08);border:1px solid rgba(255,45,120,.2);
     border-radius:10px;padding:14px 16px;margin-bottom:20px;font-size:12px;color:var(--mag)}
.info{background:rgba(255,181,71,.08);border:1px solid rgba(255,181,71,.2);
      border-radius:10px;padding:14px 16px;margin-bottom:20px;font-size:12px;color:var(--gold);line-height:1.6}
.info a{color:var(--cyan);text-decoration:none}

.ftr{margin-top:40px;padding-top:18px;border-top:1px solid rgba(255,255,255,.05);
     display:flex;justify-content:space-between;font-size:11px;color:var(--muted);flex-wrap:wrap;gap:8px}
.ftr a{color:var(--cyan);text-decoration:none}

#loader{display:flex;align-items:center;justify-content:center;height:60vh;flex-direction:column;gap:14px}
.spin{width:34px;height:34px;border-radius:50%;border:2px solid rgba(0,212,255,.2);
      border-top-color:var(--cyan);animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="wrap">
  <div id="loader"><div class="spin"></div><span style="color:var(--muted);font-size:13px">Загрузка данных...</span></div>
  <div id="app" style="display:none"></div>
</div>
<script>
// ─── НАСТРОЙКИ ────────────────────────────────
const SHEET_ID = '1izDsZ7aOc_1v064vGr2cU3xtYlSA2atvZrg6tyo2oNw';
const KPI_GID  = '901148838';
// ─────────────────────────────────────────────

const DEMO = {
  gross_revenue:88666911,net_revenue:72677796,ebitda:15709584,net_profit:11482267,
  ebitda_margin:0.216,np_margin:0.158,cf_ytd:14843757,ebitda_ytd:5817563,np_ytd:4628369,
  clients_active:10,clients_confirm:6,tbu_mm:13,tbu_aks:7,
  next_mm:'август 2026',opex_month:1415250,deferred:2542991,min_cash:3975008,
  month_label:'июнь 2026',updated:'апрель–май 2026 (факт)',
  leads:108,scored:16,approved:11,guests:5,signed:2,
  q1_sub:9000000,q1_mm:0,q1_str:284154,
  q2_sub:9500000,q2_mm:13000000,q2_str:2282000,
  q3_sub:12000000,q3_mm:7000000,q3_str:3243278,
  q4_sub:13500000,q4_mm:11500000,q4_str:2382992,
  ebitda_apr:-447408,ebitda_may:-447408,ebitda_jun:-286398,ebitda_jul:136827,
  ebitda_aug:4326318,ebitda_sep:508787,ebitda_oct:1476140,ebitda_nov:1394616,
  ebitda_dec:972715,ebitda_jan:4481129,ebitda_feb:1389364,ebitda_mar:1705497,
};

// Парсер CSV — обрабатывает русскую локаль (запятая как разделитель) и форматы процентов
function parseCSV(txt) {
  const d = {};
  const lines = txt.trim().split(/\r?\n/);
  lines.slice(1).forEach(line => {
    // CSV может содержать кавычки вокруг значений
    const cols = line.split(',');
    if (!cols[0]) return;
    const key = cols[0].trim().replace(/"/g,'');
    let val = (cols[1]||'').trim().replace(/"/g,'');
    // Убираем пробелы-разделители тысяч: "1 415 250" → "1415250"
    val = val.replace(/\s/g,'');
    // Процент: "21.6%" или "21,6%" → число 0.216
    if (val.endsWith('%')) {
      const n = parseFloat(val.replace('%','').replace(',','.'));
      if (!isNaN(n)) { d[key] = n/100; return; }
    }
    // Число с русской запятой: "21,6" → 21.6
    const n = parseFloat(val.replace(',','.'));
    if (!isNaN(n)) { d[key] = n; return; }
    // Строка
    if (val) d[key] = val;
  });
  return d;
}

async function loadData() {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${KPI_GID}&cachebust=${Date.now()}`;
  try {
    const r = await fetch(url);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const txt = await r.text();
    if (txt.includes('<!DOCTYPE') || txt.includes('<html')) throw new Error('Лист не опубликован');
    const parsed = parseCSV(txt);
    // Проверяем что пришли реальные данные
    if (!parsed.gross_revenue) throw new Error('Данные не распознаны');
    return { data:{...DEMO,...parsed}, demo:false, err:null };
  } catch(e) {
    return { data:DEMO, demo:true, err:e.message };
  }
}

const N = (n,c) => n!=null ? new Intl.NumberFormat('ru-RU').format(Math.round(n)) : '—';
const Nc = (n) => {
  if (n==null) return '—';
  if (Math.abs(n)>=1e9) return (n/1e9).toFixed(1)+' млрд';
  if (Math.abs(n)>=1e6) return (n/1e6).toFixed(1)+' млн';
  if (Math.abs(n)>=1e3) return (n/1e3).toFixed(0)+' тыс';
  return String(Math.round(n));
};
const Pct = n => n!=null ? (n*100).toFixed(1)+'%' : '—';

function kpi(lbl,val,sub,vc='v-c',ac='c') {
  return `<div class="kpi ${ac}"><div class="kpi-lbl">${lbl}</div>
  <div class="kpi-val ${vc}">${val}</div>${sub?`<div class="kpi-sub">${sub}</div>`:''}</div>`;
}

let chartQ=null, chartM=null;

function buildCharts(d) {
  // Уничтожаем старые экземпляры если есть
  if (chartQ) { chartQ.destroy(); chartQ=null; }
  if (chartM) { chartM.destroy(); chartM=null; }

  const gridColor = 'rgba(255,255,255,0.05)';
  const tickStyle = { color:'#4A6080', font:{size:10,family:"'DM Mono',monospace"} };

  // Chart 1: выручка по кварталам (stacked bar)
  const cq = document.getElementById('cq');
  if (cq) {
    chartQ = new Chart(cq, {
      type:'bar',
      data:{
        labels:['Q1 апр–июн','Q2 июл–сен','Q3 окт–дек','Q4 янв–мар'],
        datasets:[
          {label:'Подписки',   data:[d.q1_sub,d.q2_sub,d.q3_sub,d.q4_sub], backgroundColor:'#1A4A6B', stack:'a'},
          {label:'ММ-события', data:[d.q1_mm, d.q2_mm, d.q3_mm, d.q4_mm],  backgroundColor:'#00D4FF', stack:'a'},
          {label:'Стратсессии',data:[d.q1_str,d.q2_str,d.q3_str,d.q4_str], backgroundColor:'#FF2D78', stack:'a'},
        ]
      },
      options:{
        responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{ labels:{color:'#4A6080',font:{size:11}} } },
        scales:{
          x:{ stacked:true, grid:{color:gridColor}, ticks:tickStyle },
          y:{ stacked:true, grid:{color:gridColor}, ticks:{...tickStyle, callback:v=>Nc(v)} }
        }
      }
    });
  }

  // Chart 2: EBITDA помесячно
  const cm = document.getElementById('cm');
  if (cm) {
    const months = ['апр','май','июн','июл','авг','сен','окт','ноя','дек','янв','фев','мар'];
    const eVals = [d.ebitda_apr,d.ebitda_may,d.ebitda_jun,d.ebitda_jul,d.ebitda_aug,d.ebitda_sep,
                   d.ebitda_oct,d.ebitda_nov,d.ebitda_dec,d.ebitda_jan,d.ebitda_feb,d.ebitda_mar];
    chartM = new Chart(cm, {
      type:'bar',
      data:{
        labels:months,
        datasets:[{
          label:'EBITDA',
          data:eVals,
          backgroundColor:eVals.map(v=>v>=0?'rgba(0,229,160,0.75)':'rgba(255,45,120,0.75)'),
          borderRadius:3,
        }]
      },
      options:{
        responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{display:false} },
        scales:{
          x:{ grid:{color:gridColor}, ticks:tickStyle },
          y:{ grid:{color:gridColor}, ticks:{...tickStyle, callback:v=>Nc(v)} }
        }
      }
    });
  }
}

function render(d, demo, err, time) {
  const funnel = [
    {s:'Заявки',  n:d.leads,    b:d.leads},
    {s:'Скоринг', n:d.scored,   b:d.leads},
    {s:'Одобрено',n:d.approved, b:d.leads},
    {s:'Гости ММ',n:d.guests,   b:d.leads},
    {s:'Договор', n:d.signed,   b:d.leads},
  ];
  const clients=[
    {name:'Изосина / Oazis Estate',   t:'opt', l:'→ Опцион'},
    {name:'Голубенко / Разум Инвест', t:'opt', l:'→ Опцион'},
    {name:'Бражников / Лига Миров',   t:'active',l:'Активен'},
    {name:'ООО ВСЕЛЕННАЯ (Бобрук)',   t:'active',l:'Активен'},
    {name:'Иванова Наталья',          t:'active',l:'Акселерация'},
    {name:'Цыганов / Рыбак',          t:'warn', l:'Уточнить'},
  ];
  const tbu_ok = d.clients_active >= d.tbu_aks;
  const rnp=[
    {c:'g',i:tbu_ok?'✓':'⚠',
     t:tbu_ok?`<b>Запас выше ТБУ Акс</b> <span>(${d.clients_active} кл · ТБУ ${d.tbu_aks})</span>`
             :`<b>Ниже ТБУ по подписке</b> <span>(нужно ${d.tbu_mm} кл — перекрывается ММ-событиями)</span>`},
    {c:'g',i:'📅',t:`<b>Ближайший ММ</b> <span>— ${d.next_mm}</span>`},
    {c:'y',i:'💰',t:`<b>Мин. остаток до августа</b> <span>${Nc(d.min_cash)} ₽</span>`},
    {c:'g',i:'📈',t:`<b>EBITDA год план ${Nc(d.ebitda)} ₽</b> <span>· рент. ${Pct(d.ebitda_margin)}</span>`},
    {c:'y',i:'🎯',t:`<b>Цель к дек.26</b> <span>— 16 клиентов (+6 с ММ-событий)</span>`},
  ];

  document.getElementById('app').innerHTML = `
    ${demo ? `<div class="info">
      <b>Demo данные${err?' · <code>'+err+'</code>':''}</b><br>
      Чтобы подключить Google Sheets: <b>Файл → Поделиться → Опубликовать в интернете</b>
      → выбери лист <b>KPI</b> → формат <b>CSV</b> → Опубликовать.
      Затем нажми <a href="javascript:init()">↻ Обновить</a> здесь.
    </div>` : ''}

    <div class="hdr">
      <div class="hdr-l">
        <div class="logo">МД</div>
        <div><div class="hdr-title">Фонд-Акселератор МД</div>
             <div class="hdr-sub">Управленческий дашборд · апр.2026 – мар.2027</div></div>
      </div>
      <div class="hdr-r">
        ${demo?'<span class="badge demo">Demo</span>':'<span class="badge">Live ✓</span>'}
        <span class="badge">Обновлено: ${time}</span>
        <button class="btn" onclick="init()">↻ Обновить</button>
      </div>
    </div>

    <div class="sec">Статус · ${d.month_label}</div>
    <div class="pills">
      <div class="pill ${d.ebitda>0?'g':'y'}"><div class="dot"></div>EBITDA год: ${Nc(d.ebitda)} ₽</div>
      <div class="pill ${tbu_ok?'g':'y'}"><div class="dot"></div>Портфель: ${d.clients_active} кл · ТБУ Акс: ${d.tbu_aks}</div>
      <div class="pill y"><div class="dot"></div>Ближайший ММ: ${d.next_mm}</div>
      <div class="pill g"><div class="dot"></div>Мин. остаток: ${Nc(d.min_cash)} ₽</div>
    </div>

    <div class="sec">Ключевые показатели · план год</div>
    <div class="kpi-grid">
      ${kpi('Выручка gross / год',   Nc(d.gross_revenue)+' ₽',  'апр.26–мар.27','v-c','c')}
      ${kpi('Выручка net / год',     Nc(d.net_revenue)+' ₽',    'без НДС 22%','v-w','c')}
      ${kpi('EBITDA / год',          Nc(d.ebitda)+' ₽',         'Рент. '+Pct(d.ebitda_margin),'v-gn','gn')}
      ${kpi('Чистая прибыль / год',  Nc(d.net_profit)+' ₽',    'Рент. '+Pct(d.np_margin),'v-gn','gn')}
      ${kpi('OPEX / месяц',          Nc(d.opex_month)+' ₽',     'с 01.06.2026','v-go','go')}
      ${kpi('Клиентов в модели',     String(d.clients_active),  'подтв.: '+d.clients_confirm,'v-m','m')}
      ${kpi('Отложенная выручка',    Nc(d.deferred)+' ₽',       'аванс, услуга впереди','v-go','go')}
      ${kpi('CF нарастающим',        Nc(d.cf_ytd)+' ₽',         'факт окт.25–май.26','v-c','c')}
    </div>

    <div class="sec">Факт нарастающим · окт.2025 – май.2026</div>
    <div class="ytd-grid">
      ${kpi('EBITDA YTD',         Nc(d.ebitda_ytd)+' ₽','операц. прибыль','v-gn','gn')}
      ${kpi('Чистая прибыль YTD', Nc(d.np_ytd)+' ₽',   'после НДС','v-gn','gn')}
      ${kpi('CF YTD',             Nc(d.cf_ytd)+' ₽',    'реально на счёте','v-c','c')}
    </div>

    <div class="sec">Выручка и EBITDA · план апр.26–мар.27</div>
    <div class="charts-grid">
      <div class="card">
        <div class="card-t">Выручка gross по продуктам — поквартально</div>
        <div class="chart-box"><canvas id="cq"></canvas></div>
      </div>
      <div class="card">
        <div class="card-t">EBITDA по месяцам</div>
        <div class="chart-box"><canvas id="cm"></canvas></div>
      </div>
    </div>

    <div class="sec">Портфель и воронка · ${d.month_label}</div>
    <div class="bot-grid">
      <div class="card">
        <div class="card-t">Воронка продаж</div>
        ${funnel.map(f=>`
          <div class="fr">
            <div class="f-stage">${f.s}</div>
            <div class="f-bg"><div class="f-bar" style="width:${f.b?Math.round(f.n/f.b*100):0}%"></div></div>
            <div class="f-n">${f.n}</div>
            <div class="f-p">${f.b?Math.round(f.n/f.b*100)+'%':'—'}</div>
          </div>`).join('')}
        <div style="margin-top:12px;padding-top:10px;border-top:1px solid rgba(255,255,255,.06);
                    display:flex;justify-content:space-between;font-size:11px;color:var(--muted)">
          <span>Итоговая конверсия</span>
          <span style="font-family:'DM Mono',monospace;color:var(--cyan)">
            ${d.leads?(d.signed/d.leads*100).toFixed(1)+'%':'—'}
          </span>
        </div>
      </div>
      <div>
        <div class="card" style="margin-bottom:14px">
          <div class="card-t">Портфель компаний</div>
          ${clients.map(c=>`
            <div class="cr"><div class="cr-name">${c.name}</div>
            <div class="ct ${c.t}">${c.l}</div></div>`).join('')}
        </div>
        <div class="card">
          <div class="card-t">К РНП — ключевые темы</div>
          ${rnp.map(r=>`
            <div class="ri"><div class="ri-ic ${r.c}">${r.i}</div>
            <div class="rt">${r.t}</div></div>`).join('')}
        </div>
      </div>
    </div>

    <div class="ftr">
      <span style="font-family:'DM Mono',monospace">Фонд-Акселератор МД · ООО «Группа Развития»</span>
      <span>Данные: ${d.updated} · <a href="https://fond-accelerator.ru" target="_blank">fond-accelerator.ru</a></span>
    </div>
  `;

  // Строим графики после рендера DOM
  requestAnimationFrame(() => buildCharts(d));
}

async function init() {
  document.getElementById('loader').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  const {data,demo,err} = await loadData();
  const time = new Date().toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('loader').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  render(data,demo,err,time);
}

init();
</script>
</body>
</html>
